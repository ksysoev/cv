name: Deploy Hugo resume to GitHub Pages

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HUGO_VERSION: "0.147.9"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Prepare Hugo data file
        run: |
          mkdir -p data
          cp resume.yaml data/resume.yaml

      - name: Compute baseURL
        id: vars
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "baseurl=https://${{ github.repository_owner }}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "baseurl=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Build
        run: hugo --minify --baseURL "${{ steps.vars.outputs.baseurl }}"

      - name: Convert resume YAML to JSONResume
        run: |
          ruby -ryaml -rjson -e 'File.write("resume.json", JSON.pretty_generate(YAML.safe_load(File.read("resume.yaml"))))'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate CV PDF
        run: |
          npm install --no-save resume-cli jsonresume-theme-flat puppeteer
          npx resume export public/cv.html --resume resume.json --theme flat
          node -e '
            const path = require("node:path");
            const puppeteer = require("puppeteer");
            (async () => {
              const browser = await puppeteer.launch({
                headless: true,
                args: ["--no-sandbox", "--disable-setuid-sandbox"],
              });
              const page = await browser.newPage();
              const htmlPath = "file://" + path.resolve("public/cv.html");
              await page.goto(htmlPath, { waitUntil: "networkidle0" });
              await page.pdf({
                path: "public/cv.pdf",
                format: "A4",
                printBackground: true,
              });
              await browser.close();
            })();
          '

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
